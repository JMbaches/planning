<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JM Bâches — Configurateur Devis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:    #162D5E;
    --navy-d:  #0F1F42;
    --navy-l:  #1E3A73;
    --blue:    #2563EB;
    --bg:      #EDF1F7;
  }

  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(110deg, var(--navy-d) 0%, var(--navy-l) 100%);
    color: #fff;
    padding: 0 28px;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 14px rgba(0,0,0,.35);
    flex-shrink: 0;
    z-index: 10;
  }
  .logo {
    background: #fff;
    color: var(--navy);
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 14px; letter-spacing: -0.5px;
    flex-shrink: 0;
  }
  .header-text h1 { font-size: 17px; font-weight: 700; line-height: 1.2; }
  .header-text p  { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 1px; }

  /* ── Tab bar ── */
  .tab-bar {
    background: var(--navy-d);
    padding: 0 28px;
    display: flex;
    gap: 4px;
    border-bottom: 2px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
    z-index: 9;
  }
  .tab-btn {
    background: none; border: none; cursor: pointer;
    padding: 13px 22px; font-size: 13px; font-weight: 600;
    color: rgba(255,255,255,0.5);
    border-bottom: 2px solid transparent; margin-bottom: -2px;
    transition: color .2s, border-color .2s;
    font-family: inherit;
  }
  .tab-btn:hover { color: rgba(255,255,255,0.8); }
  .tab-btn.active { color: #fff; border-bottom-color: var(--blue); }

  /* ── Iframe container ── */
  .frame-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    background: var(--bg);
    display: none;
  }
  iframe.active { display: block; }
</style>
</head>
<body>

  <header>
    <div class="logo">JM</div>
    <div class="header-text">
      <h1>Configurateur Devis</h1>
      <p>JM Bâches — Simulateur client</p>
    </div>
  </header>

  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="volet">Volet hors-sol</button>
    <button class="tab-btn" data-tab="immerge">Volet immergé</button>
    <button class="tab-btn" data-tab="baches">Bâches</button>
  </nav>

  <div class="frame-wrap">
    <iframe class="active" data-tab="volet"   src="configurateur-volet.html?embedded=1"   title="Volet hors-sol"></iframe>
    <iframe                data-tab="immerge" src="configurateur-immerge.html?embedded=1" title="Volet immergé"></iframe>
    <iframe                data-tab="baches"  src="configurateur-baches.html?embedded=1"  title="Bâches"></iframe>
  </div>

  <script>
    const buttons = document.querySelectorAll('.tab-btn');
    const frames  = document.querySelectorAll('iframe');

    function show(tab) {
      buttons.forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      frames.forEach(f  => f.classList.toggle('active', f.dataset.tab === tab));
    }

    buttons.forEach(b => b.addEventListener('click', () => show(b.dataset.tab)));
  </script>

</body>
</html>
